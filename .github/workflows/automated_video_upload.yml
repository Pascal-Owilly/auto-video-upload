name: Automated Video Upload

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'

  # Optional: Run when there's a push to the main branch
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # Runs the workflow on the latest Ubuntu runner

    steps:
      # Step 1: Check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Change to your desired Python version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r auto_funny_videos/requirements.txt

      # Step 4: Install yt-dlp and ffmpeg
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install yt-dlp  # Ensures yt-dlp is installed via Python as well

      # Step 5: Run the video automation script
      - name: Run the video automation script
        run: python auto_funny_videos/funny_videos.py

      # Step 6: Upload video to YouTube (Assumes you have the credentials set up as secrets)
      - name: Upload video to YouTube
        run: python auto_funny_videos/funny_videos.py  # Ensure this step includes your upload logic
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}  # Set your API key as a secret in GitHub
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # Set your OpenAI API key as a secret

      # Step 7: Check if the video upload was successful and delete the video from the GitHub runner
      - name: Delete video from GitHub runner
        run: |
          if [ -f "downloads/edited_video.mp4" ]; then
            echo "Deleting video file from GitHub runner..."
            rm "downloads/edited_video.mp4"
          else
            echo "No video file found to delete."
          fi

